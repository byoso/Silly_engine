name: Test Suite

on:
  push:
  pull_request:

jobs:

  misc-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run miscellaneous tests
        run: |
          python -m pytest tests/*.py -q

  sqlite-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run SQLite-focused tests
        run: |
          python -m pytest tests/tests_silly_orm -q

  postgres-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_USER: silly
          POSTGRES_PASSWORD: silly
          POSTGRES_DB: silly_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U silly -d silly_engine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install psycopg2-binary

      - name: Run Postgres integration tests
        env:
          TEST_POSTGRES_DSN: postgresql://silly:silly@localhost:5432/silly_engine_test
        run: |
          python -m pytest tests/tests_silly_orm_postgres -q
